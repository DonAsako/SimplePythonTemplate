version: 2
updates:
  # Python dependencies managed by uv (reads pyproject.toml / uv.lock)
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python-dependencies:
        patterns: ["*"]

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
