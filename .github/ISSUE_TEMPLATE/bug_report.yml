name: Bug report
description: Report something that isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps (or a code snippet) that reproduce the issue.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Package version or git commit where you saw this.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, and how you installed the project.
    validations:
      required: false
